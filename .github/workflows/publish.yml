name: Publish

on:
  workflow_dispatch:
    inputs:
      crate:
        description: "Crate to publish (leave as 'workspace' to publish all)"
        required: true
        type: choice
        options:
          - workspace
          - logform
          - winston_transport
          - winston_file
          - winston_daily_rotate_file
          - winston_http
          - winston_mongodb
          - winston_proxy_transport
          - winston_tracing
          - winston
      level:
        description: "Version level"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - alpha
          - beta
          - rc
          - release

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install cargo-release
        run: cargo install cargo-release --locked

      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked

      - name: Collect target crates
        run: |
          # Computes the version cargo-release would produce for a given base version and level.
          next_version() {
            local full="$1" level="$2"
            local base="${full%%-*}"
            local pre="${full#*-}"
            local major minor patch
            IFS='.' read -r major minor patch <<< "$base"
            case "$level" in
              release) echo "$base" ;;
              patch)   echo "$major.$minor.$((patch + 1))" ;;
              minor)   echo "$major.$((minor + 1)).0" ;;
              major)   echo "$((major + 1)).0.0" ;;
              alpha|beta|rc)
                # If already on this pre-release level (e.g. alpha.2 -> alpha.3), increment.
                # Otherwise start at .1.
                if [[ "$pre" == ${level}.* ]]; then
                  local num="${pre#${level}.}"
                  echo "${base}-${level}.$((num + 1))"
                else
                  echo "${base}-${level}.1"
                fi
                ;;
            esac
          }

          if [ "${{ inputs.crate }}" = "workspace" ]; then
            # Collect all crates that have a pre-release version suffix.
            RAW=$(find . -maxdepth 2 -name 'Cargo.toml' -not -path './Cargo.toml' \
              | xargs grep -l '^\[package\]' \
              | while read -r f; do
                  name=$(grep '^\s*name\s*=' "$f" | head -1 | sed 's/.*= *"\(.*\)"/\1/')
                  version=$(grep '^\s*version\s*=' "$f" | head -1 | sed 's/.*= *"\(.*\)"/\1/')
                  case "$version" in *-*) echo "$name $version" ;; esac
                done)
          else
            f=$(find . -maxdepth 2 -name 'Cargo.toml' -path "*/${{ inputs.crate }}/Cargo.toml" | head -1)
            name=$(grep '^\s*name\s*=' "$f" | head -1 | sed 's/.*= *"\(.*\)"/\1/')
            version=$(grep '^\s*version\s*=' "$f" | head -1 | sed 's/.*= *"\(.*\)"/\1/')
            RAW="$name $version"
          fi

          if [ -z "$RAW" ]; then
            echo "No crates with pre-release versions found."
            exit 1
          fi

          # Build --package args and name->target_version pairs for downstream steps.
          PACKAGE_ARGS=""
          TARGET_VERSIONS=""
          while IFS=' ' read -r name version; do
            [ -z "$name" ] && continue
            target=$(next_version "$version" "${{ inputs.level }}")
            PACKAGE_ARGS="$PACKAGE_ARGS --package $name"
            TARGET_VERSIONS="$TARGET_VERSIONS $name=$target"
          done <<< "$RAW"

          echo "PACKAGE_ARGS=${PACKAGE_ARGS# }" >> "$GITHUB_ENV"
          echo "TARGET_VERSIONS=${TARGET_VERSIONS# }" >> "$GITHUB_ENV"

      - name: Validate target versions not already published
        run: |
          FAILED=0
          for entry in $TARGET_VERSIONS; do
            name="${entry%=*}"
            target="${entry#*=}"
            published=$(curl -sf "https://crates.io/api/v1/crates/$name/versions" \
              -H "User-Agent: publish-workflow (github.com/ifeanyi-ugwu/winston_logger_rs)" \
              | jq -r '.versions[].num' 2>/dev/null || true)
            if echo "$published" | grep -qx "$target"; then
              echo "error: $name $target is already published on crates.io"
              FAILED=1
            else
              echo "ok: $name $target is unpublished"
            fi
          done
          [ "$FAILED" -eq 1 ] && exit 1 || true

      - name: Check SemVer
        run: cargo semver-checks $PACKAGE_ARGS

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo release ${{ inputs.level }} $PACKAGE_ARGS --execute --no-confirm
