name: Publish

on:
  workflow_dispatch:
    inputs:
      crate:
        description: "Crate to publish (leave as 'workspace' to publish all)"
        required: true
        type: choice
        options:
          - workspace
          - logform
          - winston_transport
          - winston_file
          - winston_daily_rotate_file
          - winston_http
          - winston_mongodb
          - winston_proxy_transport
          - winston_tracing
          - winston
      level:
        description: "Version level"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - alpha
          - beta
          - rc
          - release

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install cargo-release
        run: cargo install cargo-release

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ "${{ inputs.crate }}" = "workspace" ]; then
            # --unpublished cannot be combined with a level, so we find crates
            # with pre-release versions ourselves. All are passed to a single
            # cargo release call so it can resolve dependency order correctly.
            PACKAGE_ARGS=$(find . -maxdepth 2 -name 'Cargo.toml' -not -path './Cargo.toml' \
              | xargs grep -l '^\[package\]' \
              | while read f; do
                  name=$(grep '^\s*name\s*=' "$f" | head -1 | sed 's/.*= *"\(.*\)"/\1/')
                  version=$(grep '^\s*version\s*=' "$f" | head -1 | sed 's/.*= *"\(.*\)"/\1/')
                  case "$version" in *-*) echo "--package $name" ;; esac
                done | tr '\n' ' ')
            if [ -z "$PACKAGE_ARGS" ]; then
              echo "No crates with pre-release versions found."
              exit 0
            fi
            echo "Releasing: $PACKAGE_ARGS"
            cargo release ${{ inputs.level }} $PACKAGE_ARGS --execute --no-confirm
          else
            cargo release ${{ inputs.level }} --package ${{ inputs.crate }} --execute --no-confirm
          fi
